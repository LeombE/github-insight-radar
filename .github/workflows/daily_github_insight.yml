name: Daily GitHub Insight

on:
  schedule:
    - cron: "17 16,4 * * *"
  workflow_dispatch:
    inputs:
      mock_mode:
        description: "Run fully offline using deterministic mock fixtures"
        required: false
        default: "false"
      run_date:
        description: "Run date, YYYY-MM-DD or today"
        required: false
        default: "today"

permissions:
  contents: write

jobs:
  daily-insight:
    runs-on: ubuntu-latest
    env:
      GH_PAT: ${{ secrets.GH_PAT }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ENABLE_IMAGE_GENERATION: ${{ vars.ENABLE_IMAGE_GENERATION || 'false' }}
      ENABLE_LLM_SUMMARY: ${{ vars.ENABLE_LLM_SUMMARY || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Generate reports
        shell: bash
        run: |
          RUN_DATE="${{ github.event.inputs.run_date || 'today' }}"
          if [ "${{ github.event.inputs.mock_mode }}" = "true" ]; then
            python -m github_insight.cli run --mock --date "$RUN_DATE"
          else
            python -m github_insight.cli run --date "$RUN_DATE"
          fi

      - name: Rebuild dashboard
        run: python -m github_insight.cli dashboard

      - name: Validate outputs
        run: python -m github_insight.cli validate

      - name: Commit generated outputs
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data reports docs assets dashboard
          if git diff --cached --quiet; then
            echo "No generated output changes to commit."
          else
            git commit -m "chore: update daily GitHub insight outputs"
            git push
          fi
