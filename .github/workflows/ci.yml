name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Ruff check
        run: python -m ruff check github_insight scripts tests

      - name: Pytest
        run: python -m pytest

      - name: Mock CLI run
        run: python -m github_insight.cli run --mock

      - name: Validate mock preview outputs
        run: python -m github_insight.cli --output-root .pytest-tmp/mock-run validate